<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Sikka — Privacy-First Offline Finance Tracker</title>
    <meta name="description" content="Sikka is a 100% offline, open-source personal finance tracker for Android. Track expenses, manage accounts, and analyze spending — all without internet. Your data never leaves your device." />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Sikka" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="canonical" href="https://www.sikka.pawarsachin.dev/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.sikka.pawarsachin.dev/" />
    <meta property="og:site_name" content="Sikka" />
    <meta property="og:title" content="Sikka — Privacy-First Offline Finance Tracker" />
    <meta property="og:description" content="Track your money 100% offline. Open-source, encrypted, zero data collection. Your finances, your device, your control." />
    <meta property="og:image" content="https://sikka.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sikka — Privacy-First Offline Finance Tracker" />
    <meta name="twitter:description" content="Track your money 100% offline. Open-source, encrypted, zero data collection." />
    <meta name="twitter:image" content="https://sikka.app/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Fonts Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
